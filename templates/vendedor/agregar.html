{% extends "base.html" %}
{% block title %}Agregar prenda — Mi Tienda{% endblock %}
{% block contenido %}
<div class="contenedor form-container">
  <a href="/mi-tienda" class="btn-volver">← Volver a mi tienda</a>
  <h1 class="form-titulo">Agregar nueva prenda</h1>

  <form method="POST" enctype="multipart/form-data" class="form-prenda">
    <div class="campo">
      <label>Nombre de la prenda *</label>
      <input type="text" name="nombre" placeholder="Ej: Vestido floral azul" required>
    </div>
    <div class="campo">
      <label>Descripción *</label>
      <textarea name="descripcion" rows="4" placeholder="Describe la prenda: material, detalles, motivo de venta..." required></textarea>
    </div>
    <div class="campos-fila">
      <div class="campo">
        <label>Tu precio ($) * <small>El comprador verá este precio + 7%</small></label>
        <input type="number" name="precio" min="0.50" step="0.50" placeholder="15.00" required id="precio-input">
        <small class="precio-preview" id="precio-preview"></small>
      </div>
      <div class="campo">
        <label>Talla *</label>
        <select name="talla" required>
          <option value="">Seleccionar</option>
          {% for t in ['XS','S','M','L','XL','XXL','Única','34','36','38','40','42','44'] %}
            <option>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="campos-fila">
      <div class="campo">
        <label>Categoría *</label>
        <select name="categoria" required>
          <option value="">Seleccionar</option>
          {% for cat in ['Blusas','Camisas','Pantalones','Vestidos','Faldas','Abrigos','Chaquetas','Zapatos','Bolsos','Accesorios','Ropa deportiva','Otros'] %}
            <option>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="campo">
        <label>Estado *</label>
        <select name="estado" required>
          <option value="">Seleccionar</option>
          <option>Excelente</option><option>Muy bueno</option><option>Bueno</option>
        </select>
      </div>
    </div>
    <div class="campo">
      <label>Foto de la prenda</label>
      <input type="file" name="imagen" accept="image/*" id="input-imagen">
      <div id="preview" style="display:none;margin-top:0.5rem">
        <img id="preview-img" src="" style="max-width:200px;border-radius:8px">
      </div>
    </div>
    <div class="campo campo-check">
      <label class="check-label">
        <input type="checkbox" name="destacado"> ⭐ Marcar como destacada (aparece primero)
      </label>
    </div>
    <div class="form-acciones">
      <a href="/mi-tienda" class="btn-secundario">Cancelar</a>
      <button type="submit" class="btn-primario">Publicar prenda</button>
    </div>
  </form>
</div>

<script>
  document.getElementById('precio-input').addEventListener('input', function() {
    const precio = parseFloat(this.value);
    const preview = document.getElementById('precio-preview');
    if (precio > 0) {
      preview.textContent = `El comprador verá: $${(precio * 1.07).toFixed(2)} (incluye 7% de comisión)`;
    } else {
      preview.textContent = '';
    }
  });

  document.getElementById('input-imagen').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('preview-img').src = ev.target.result;
        document.getElementById('preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
{% endblock %}
