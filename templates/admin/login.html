<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gris">

  <div class="login-container">
    <h1 class="login-titulo">Panel Admin</h1>
    <p class="login-sub">{{ nombre_tienda }}</p>

    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in mensajes %}
        <div class="alerta alerta-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="login-form">
      <div class="campo">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required autocomplete="username">
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primario w-full">Entrar</button>
    </form>

    <a href="/" class="login-volver">← Volver a la tienda</a>
  </div>

</body>
</html>
