<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fondo navy -->
  <rect width="192" height="192" rx="32" fill="#1E3A5F"/>

  <!-- Bandera Ecuador: amarillo 50%, azul 25%, rojo 25% -->
  <clipPath id="flag192">
    <rect x="20" y="18" width="152" height="76" rx="8"/>
  </clipPath>
  <g clip-path="url(#flag192)">
    <rect x="20" y="18" width="152" height="38" fill="#FFD100"/>
    <rect x="20" y="56" width="152" height="19" fill="#003DA5"/>
    <rect x="20" y="75" width="152" height="19" fill="#CE1126"/>
  </g>

  <!-- Escudo Nacional del Ecuador -->
  <defs>
    <clipPath id="ov192"><ellipse cx="96" cy="57" rx="13" ry="16"/></clipPath>
  </defs>

  <!-- Ramas de laurel izquierda -->
  <path d="M82,73 Q77,60 79,44" fill="none" stroke="#2D6A1F" stroke-width="1.8"/>
  <ellipse cx="79" cy="70" rx="4.5" ry="2" transform="rotate(-35 79 70)" fill="#2D6A1F"/>
  <ellipse cx="78" cy="62" rx="4.5" ry="2" transform="rotate(-55 78 62)" fill="#2D6A1F"/>
  <ellipse cx="78" cy="54" rx="4" ry="1.8" transform="rotate(-70 78 54)" fill="#2D6A1F"/>
  <ellipse cx="79" cy="47" rx="3.5" ry="1.5" transform="rotate(-80 79 47)" fill="#2D6A1F"/>

  <!-- Ramas de palma derecha -->
  <path d="M110,73 Q115,60 113,44" fill="none" stroke="#1E5C16" stroke-width="1.8"/>
  <ellipse cx="113" cy="70" rx="4.5" ry="2" transform="rotate(35 113 70)" fill="#1E5C16"/>
  <ellipse cx="114" cy="62" rx="4.5" ry="2" transform="rotate(55 114 62)" fill="#1E5C16"/>
  <ellipse cx="114" cy="54" rx="4" ry="1.8" transform="rotate(70 114 54)" fill="#1E5C16"/>
  <ellipse cx="113" cy="47" rx="3.5" ry="1.5" transform="rotate(80 113 47)" fill="#1E5C16"/>

  <!-- Fondo blanco del óvalo -->
  <ellipse cx="96" cy="57" rx="13.5" ry="16.5" fill="white"/>

  <!-- Interior del escudo (clipeado al óvalo) -->
  <g clip-path="url(#ov192)">
    <!-- Cielo azul claro -->
    <rect x="83" y="41" width="26" height="16" fill="#5BABD9"/>
    <!-- Mar azul oscuro -->
    <rect x="83" y="57" width="26" height="16" fill="#1B4F8A"/>
    <!-- Sol en el horizonte -->
    <circle cx="96" cy="57" r="5.5" fill="#FFD700"/>
    <!-- Chimborazo -->
    <polygon points="96,45 84,66 108,66" fill="#7A8C9E"/>
    <polygon points="96,45 91,55 101,55" fill="white"/>
    <polygon points="96,45 93.5,50 98.5,50" fill="#EEF2F7"/>
    <!-- Barco a vapor Guayas -->
    <rect x="87" y="66" width="18" height="6" rx="1.5" fill="#2C1810"/>
    <rect x="91" y="62" width="2.5" height="5" fill="#3D2410"/>
    <rect x="95.5" y="62" width="2.5" height="5" fill="#3D2410"/>
    <circle cx="92" cy="61" r="1.2" fill="#999" opacity="0.8"/>
    <circle cx="96.5" cy="61" r="1.2" fill="#999" opacity="0.8"/>
    <circle cx="89" cy="69.5" r="1" fill="#5BABD9"/>
    <circle cx="96" cy="69.5" r="1" fill="#5BABD9"/>
    <circle cx="103" cy="69.5" r="1" fill="#5BABD9"/>
  </g>

  <!-- Borde dorado del óvalo -->
  <ellipse cx="96" cy="57" rx="13.5" ry="16.5" fill="none" stroke="#C8A84B" stroke-width="1.8"/>

  <!-- Cóndor encima del escudo -->
  <!-- Alas extendidas -->
  <path d="M80,41 Q87,36 96,38.5 Q105,36 112,41 Q105,45 96,42.5 Q87,45 80,41Z" fill="#1A1A1A"/>
  <!-- Cuerpo -->
  <ellipse cx="96" cy="41" rx="5.5" ry="4" fill="#1A1A1A"/>
  <!-- Cabeza dorada (cóndor tiene collar blanco y cresta rojiza) -->
  <circle cx="96" cy="35.5" r="3.5" fill="#C8A084"/>
  <!-- Cuello blanco -->
  <ellipse cx="96" cy="39" rx="2.5" ry="2" fill="white"/>
  <!-- Pico -->
  <path d="M96,33 Q99.5,35 97.5,38.5" fill="#1A1A1A"/>

  <!-- Bolsa de compras blanca -->
  <path d="M74 116 Q74 96 96 96 Q118 96 118 116" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <rect x="48" y="116" width="96" height="60" rx="10" fill="white"/>
  <rect x="48" y="130" width="96" height="4" rx="2" fill="#CBD5E1"/>
</svg>
