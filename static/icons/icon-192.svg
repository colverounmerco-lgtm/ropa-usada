<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fondo navy -->
  <rect width="192" height="192" rx="32" fill="#1E3A5F"/>

  <!-- Bandera Ecuador: amarillo 50%, azul 25%, rojo 25% -->
  <defs>
    <clipPath id="flag192"><rect x="20" y="18" width="152" height="76" rx="8"/></clipPath>
    <clipPath id="ov192"><ellipse cx="96" cy="57" rx="14" ry="17"/></clipPath>
  </defs>
  <g clip-path="url(#flag192)">
    <rect x="20" y="18" width="152" height="38" fill="#FFD100"/>
    <rect x="20" y="56" width="152" height="19" fill="#003DA5"/>
    <rect x="20" y="75" width="152" height="19" fill="#CE1126"/>
  </g>

  <!-- Ramas de laurel izquierda -->
  <path d="M81,75 Q76,61 78,44" fill="none" stroke="#2D6A1F" stroke-width="1.8"/>
  <ellipse cx="77.5" cy="72" rx="5" ry="2.2" transform="rotate(-42,77.5,72)" fill="#2D6A1F"/>
  <ellipse cx="76.5" cy="63.5" rx="5" ry="2.2" transform="rotate(-56,76.5,63.5)" fill="#2D6A1F"/>
  <ellipse cx="77" cy="55" rx="4.5" ry="2" transform="rotate(-68,77,55)" fill="#2D6A1F"/>
  <ellipse cx="78.5" cy="47.5" rx="3.8" ry="1.8" transform="rotate(-76,78.5,47.5)" fill="#2D6A1F"/>

  <!-- Ramas de palma derecha -->
  <path d="M111,75 Q116,61 114,44" fill="none" stroke="#1E5C16" stroke-width="1.8"/>
  <ellipse cx="114.5" cy="72" rx="5" ry="2.2" transform="rotate(42,114.5,72)" fill="#1E5C16"/>
  <ellipse cx="115.5" cy="63.5" rx="5" ry="2.2" transform="rotate(56,115.5,63.5)" fill="#1E5C16"/>
  <ellipse cx="115" cy="55" rx="4.5" ry="2" transform="rotate(68,115,55)" fill="#1E5C16"/>
  <ellipse cx="113.5" cy="47.5" rx="3.8" ry="1.8" transform="rotate(76,113.5,47.5)" fill="#1E5C16"/>

  <!-- Fondo blanco del óvalo -->
  <ellipse cx="96" cy="57" rx="14.5" ry="17.5" fill="white"/>

  <!-- Interior del escudo -->
  <g clip-path="url(#ov192)">
    <!-- Cielo azul claro -->
    <rect x="82" y="40" width="28" height="14" fill="#5BABD9"/>
    <!-- Sol -->
    <circle cx="96" cy="48" r="6.5" fill="#FFD700" opacity="0.93"/>
    <!-- Chimborazo -->
    <polygon points="96,49 83,68 109,68" fill="#7A8C9E"/>
    <!-- Nieve -->
    <polygon points="96,49 91.5,56.5 100.5,56.5" fill="#E8F0F7"/>
    <polygon points="96,49 93.5,53 98.5,53" fill="white"/>
    <!-- Mar azul -->
    <rect x="82" y="62" width="28" height="12" fill="#1B5090"/>
    <!-- Barco Guayas -->
    <rect x="86" y="61" width="20" height="5" rx="1.5" fill="#5C3A1A"/>
    <rect x="92" y="56.5" width="3" height="5.5" fill="#4A2D10"/>
    <rect x="98" y="56.5" width="3" height="5.5" fill="#4A2D10"/>
    <!-- Chimeneas -->
    <circle cx="93.5" cy="55.5" r="1.5" fill="#888" opacity="0.8"/>
    <circle cx="99.5" cy="55.5" r="1.5" fill="#888" opacity="0.8"/>
    <!-- Olas -->
    <path d="M84,66 Q87,64.5 90,66 Q93,67.5 96,66 Q99,64.5 102,66 Q105,67.5 108,66" stroke="white" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Borde dorado del óvalo -->
  <ellipse cx="96" cy="57" rx="14.5" ry="17.5" fill="none" stroke="#C8A030" stroke-width="2"/>

  <!-- CÓNDOR: alas alzadas sobre el escudo -->
  <!-- Ala izquierda (barre hacia arriba-izquierda) -->
  <path d="M96,42 C93,40 89,37 83.5,38.5 C86.5,37.5 91,39.5 96,42Z" fill="#111"/>
  <!-- Ala derecha -->
  <path d="M96,42 C99,40 103,37 108.5,38.5 C105.5,37.5 101,39.5 96,42Z" fill="#111"/>
  <!-- Plumas izquierda (detalles) -->
  <path d="M84.5,39.5 C87.5,38 91.5,39.5 96,42 C91,40.5 86.5,40.5 84.5,39.5Z" fill="#222" opacity="0.6"/>
  <!-- Plumas derecha -->
  <path d="M107.5,39.5 C104.5,38 100.5,39.5 96,42 C101,40.5 105.5,40.5 107.5,39.5Z" fill="#222" opacity="0.6"/>
  <!-- Cuerpo del cóndor -->
  <ellipse cx="96" cy="42.5" rx="6" ry="4.5" fill="#1A1A1A"/>
  <!-- Cabeza (dorado-anaranjado, cóndor tiene cabeza sin plumas) -->
  <circle cx="96" cy="35.5" r="4" fill="#C8844A"/>
  <!-- Ojo -->
  <circle cx="97.2" cy="35" r="1.2" fill="#111"/>
  <!-- Pico -->
  <path d="M97,37 Q100,36.5 98.5,39" stroke="#8B6914" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Collar blanco (característica del cóndor andino) -->
  <path d="M91.5,40.5 Q96,43.5 100.5,40.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Bolsa de compras blanca (ícono de la tienda) -->
  <path d="M74 116 Q74 96 96 96 Q118 96 118 116" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <rect x="48" y="116" width="96" height="60" rx="10" fill="white"/>
  <rect x="48" y="130" width="96" height="4" rx="2" fill="#CBD5E1"/>
</svg>
